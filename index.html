<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القرآن الكريم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-content">
            <h1>القرآن الكريم</h1>
            <p>تلاوة، قراءة وتفسير</p>
        </div>
    </div>

    <div class="app-container">
        <div class="controls-section">
            <div class="control-group">
                <label for="surahSelect">اختر السورة:</label>
                <select id="surahSelect"></select>
            </div>

            <div class="control-group">
                <label for="reciterSelect">اختر القارئ:</label>
                <select id="reciterSelect">
                    <option value="https://server8.mp3quran.net/banna/">محمود علي البنا</option>
                    <option value="https://server11.mp3quran.net/shatri/">أبوبكر الشاطري</option>
                    <option value="https://server7.mp3quran.net/basit/">عبد الباسط عبد الصمد</option>
                </select>
            </div>

            <div class="audio-controls">
                <button id="playPauseBtn" onclick="togglePlay()">بدء</button>
                <button onclick="openShareModal()">مشاركة الآيات</button>
            </div>

            <div class="tasbih-counter">
                <p>العداد: <span id="count">0</span></p>
                <button onclick="increment()">تسبيح</button>
                <button onclick="resetCounter()">تصفير</button>
            </div>
        </div>

        <div class="display-section">
            <div id="surahTextDisplay" class="surah-text-container">
                إختر سورة لتبدأ القراءة والاستماع...
            </div>
        </div>
    </div>

    <div id="customContextMenu" class="custom-context-menu">
        <div class="context-item" id="contextTafsirBtn">📑 تفسير الآية</div>
    </div>

    <div id="tafsirModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeTafsirModal()">&times;</span>
            <h2 id="tafsirTitle">تفسير الآية</h2>
            <div class="tafsir-scroll-box">
                <p id="tafsirAyahText" class="tafsir-original-ayah"></p>
                <hr>
                <p id="tafsirContentText" class="tafsir-body"></p>
            </div>
        </div>
    </div>

    <div id="shareModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeShareModal()">&times;</span>
            <h2>خيارات المشاركة</h2>
            
            <div class="share-tabs">
                <button id="typeVoice" onclick="setShareType('voice')">صوت</button>
                <button id="typeText" onclick="setShareType('text')">كتابة</button>
                <button id="typeImage" onclick="setShareType('image')">صورة</button>
            </div>

            <div class="modal-inputs">
                <div class="input-row">
                    <label>السورة:</label>
                    <input type="text" id="modalSurahInput" readonly>
                </div>
                <div class="input-row">
                    <label>من آية:</label>
                    <input type="number" id="fromAyahInput" value="1">
                </div>
                <div class="input-row">
                    <label>إلى آية:</label>
                    <input type="number" id="toAyahInput" value="5">
                </div>
                <div class="input-row" id="reciterWrapper">
                    <label>القارئ:</label>
                    <select id="modalReciterSelect">
                        <option value="https://server8.mp3quran.net/banna/">محمود علي البنا</option>
                        <option value="https://server11.mp3quran.net/shatri/">أبوبكر الشاطري</option>
                        <option value="https://server7.mp3quran.net/basit/">عبد الباسط عبد الصمد</option>
                    </select>
                </div>
            </div>

            <p id="creditText" class="credit-note">تم استخدام موقع تطبيق القرآن الكريم</p>
            <button class="main-share-btn" onclick="executeShare()">إرسال الآن</button>
        </div>
    </div>

    <canvas id="shareCanvas" style="display:none;"></canvas>
    
    <audio id="audioPlayer" style="display:none;"></audio>

    <script src="script.js"></script>
</body>
</html>
