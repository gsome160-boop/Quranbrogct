<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QEQ7K86K33"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QEQ7K86K33');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمع للقران الكريم مجانا</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; text-align: center; }
        #intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a5235; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s ease; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; border: 2px solid #333; position: relative; }
        select, input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        
        #surahTextDisplay { 
            margin-top: 20px; padding: 15px; background: #e0f7fa; border-radius: 5px; 
            min-height: 100px; max-height: 300px; overflow-y: auto; font-size: 18px; 
            line-height: 1.8; text-align: justify; direction: rtl;
        }
        
        .share-open-btn { background-color: #0288d1; color: white; border: none; cursor: pointer; font-weight: bold; }
        .share-open-btn:hover { background-color: #01579b; }
        .contact-btn { display: block; background-color: #1a5235; color: white; padding: 12px; margin-top: 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }

        /* تنسيق نافذة المشاركة */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: flex-end; }
        .modal-content { background-color: white; padding: 20px; border-top-left-radius: 20px; border-top-right-radius: 20px; width: 100%; max-width: 500px; box-sizing: border-box; text-align: right; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; font-weight: bold; color: #666; }
        
        .share-types { display: flex; justify-content: space-around; margin: 15px 0; }
        .type-btn { flex: 1; padding: 10px; margin: 0 5px; border: 1px solid #ccc; border-radius: 8px; background-color: #f5f5f5; cursor: pointer; font-weight: bold; text-align: center; }
        .type-btn.active { background-color: #ffb300; color: white; border-color: #ffb300; }
        
        .credit-text { font-size: 13px; color: #666; background: #eee; padding: 8px; border-radius: 5px; text-align: center; margin-top: 5px; display: none; }
        .range-container { display: flex; justify-content: space-between; gap: 10px; }
        .range-box { flex: 1; }
        .final-share-btn { background-color: #007bb6; color: white; font-weight: bold; border: none; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <h1>"خيركم من تعلم القرآن وعلمه"</h1>
    <p>برمجة: ابوالقاسم البشرى</p>
</div>

<div class="container">
    <h2>قسم الاستماع</h2>
    <input type="text" id="searchInput" placeholder="ابحث باسم السورة أو رقم الصفحة..." autocomplete="off">
    <ul id="suggestions" style="position: absolute; background: white; border: 1px solid #ccc; width: calc(100% - 40px); display: none; list-style: none; padding: 0; text-align: right; max-height: 150px; overflow-y: auto; z-index: 100;"></ul>
    
    <select id="surahSelect"></select>
    <select id="reciterSelect">
        <option value="https://server8.mp3quran.net/bna/">محمود علي البنا</option>
        <option value="https://server7.mp3quran.net/basit/">عبد الباسط عبد الصمد</option>
        <option value="https://server11.mp3quran.net/yasser/">ياسر الدوسري</option>
        <option value="https://server13.mp3quran.net/husr/">الحصري</option>
    </select>
    <button id="playPauseBtn" onclick="togglePlay()">بدء</button>
    
    <div id="surahTextDisplay">اختر سورة للبدء وعرض آياتها كاملة</div>
    
    <button class="share-open-btn" onclick="openShareModal()">🔗 مشاركة الآيات والسور</button>
    
    <hr>
    <h3>قسم التسبيح</h3>
    <h1 id="count">0</h1>
    <button onclick="increment()">اضغط للتسبيح</button>
    <button onclick="resetCounter()">تصفير</button>

    <hr>
    <a href="mailto:qurancommunication@gmail.com" class="contact-btn">التواصل مع المبرمج</a>
</div>

<div id="shareModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeShareModal()">&times;</span>
        <h3>مشاركة الآيات</h3>
        
        <label>السورة المحددة:</label>
        <select id="modalSurahSelect" onchange="loadAyahRange()"></select>
        
        <div class="range-container">
            <div class="range-box">
                <label>من آية:</label>
                <select id="fromAyah"></select>
            </div>
            <div class="range-box">
                <label>إلى آية:</label>
                <select id="toAyah"></select>
            </div>
        </div>

        <div class="share-types">
            <div class="type-btn" id="typeVoice" onclick="setShareType('voice')">🔊 صوت</div>
            <div class="type-btn" id="typeImage" onclick="setShareType('image')">🖼️ صورة</div>
            <div class="type-btn" id="typeText" onclick="setShareType('text')">📝 كتابة</div>
        </div>
        
        <div id="creditText" class="credit-text">تم استخدام موقع https://n9.cl/g0h73t</div>
        
        <label>اختر القارئ:</label>
        <select id="modalReciterSelect">
            <option value="https://server8.mp3quran.net/bna/">محمود علي البنا</option>
            <option value="https://server7.mp3quran.net/basit/">عبد الباسط عبد الصمد</option>
            <option value="https://server11.mp3quran.net/yasser/">ياسر الدوسري</option>
            <option value="https://server13.mp3quran.net/husr/">الحصري</option>
        </select>
        
        <button class="final-share-btn" onclick="executeShare()">مشاركة</button>
    </div>
</div>

<audio id="audioPlayer"></audio>

<canvas id="shareCanvas" style="display:none;"></canvas>

<script src="script.js"></script>
</body>
</html>
