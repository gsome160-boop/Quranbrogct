<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمع للقرآن الكريم مجاناً</title>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; img-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com/">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QEQ7K86K33"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QEQ7K86K33');
    </script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f4f7f5; 
            text-align: center; 
            user-select: none; 
            -webkit-user-select: none;
        }
        #intro-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #1a5235; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            transition: opacity 1s ease; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
        }
        h2 { color: #1a5235; margin-bottom: 20px; }
        select, input, button { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        button { 
            background-color: #1a5235; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s;
        }
        button:hover { background-color: #113622; }
        #surahTextDisplay { 
            margin-top: 15px; 
            padding: 15px; 
            background: #e8f5e9; 
            border-radius: 8px; 
            min-height: 60px; 
            font-size: 16px; 
            color: #2e7d32;
        }
        .contact-btn { 
            display: block; 
            background-color: #333; 
            color: white; 
            padding: 12px; 
            margin-top: 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
        }
        
        /* تنسيقات التسميع والتلاوة */
        .hidden { display: none !important; }
        .ayah-block { 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 6px; 
            transition: background-color 0.3s ease; 
            display: block; 
            line-height: 1.8;
            background-color: #fcfcfc;
            border-bottom: 1px solid #eee;
        }
        .ayah-active { 
            background-color: #e0e0e0 !important; 
            color: #000; 
            font-weight: bold; 
            border-left: 5px solid #1a5235;
        }
        .download-btn { background-color: #0288d1; }
        .download-btn:hover { background-color: #01579b; }
        .clickable-title { 
            cursor: pointer; 
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            border: 1px dashed #1a5235;
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <h1>"خيركم من تعلم القرآن وعلمه"</h1>
    <p>برمجة: ابوالقاسم البشرى</p>
</div>

<div class="container">
    <div id="listeningSection">
        <h2 id="listenTitle" class="clickable-title">قسم الاستماع (اضغط ثانية للتلاوة)</h2>
        <input type="text" id="searchInput" placeholder="ابحث باسم السورة...">
        <select id="surahSelect"></select>
        <select id="reciterSelect">
            <option value="https://server8.mp3quran.net/bna/">محمود علي البنا</option>
            <option value="https://server7.mp3quran.net/basit/">عبد الباسط عبد الصمد</option>
            <option value="https://server11.mp3quran.net/yasser/">ياسر الدوسري</option>
            <option value="https://server13.mp3quran.net/husr/">الحصري</option>
        </select>
        
        <label style="display:block; text-align:right; margin-top:5px; font-size: 14px; color: #666;">سرعة التشغيل:</label>
        <select id="speedSelect">
            <option value="1">طبيعية (1x)</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
        </select>

        <button id="playPauseBtn" onclick="togglePlay()">ابدأ</button>
        <button id="downloadBtn" class="download-btn" onclick="downloadAudio()">تحميل السورة للجهاز</button>
        <div id="surahTextDisplay">اختر سورة للبدء</div>
    </div>

    <div id="recitationSection" class="hidden">
        <h2>وضع تلاوة القرآن الكريم</h2>
        <select id="reciteSurahSelect"></select>
        <button id="startReciteBtn" onclick="startRecitationMode()">ابدأ القراءة والتسميع</button>
        <button onclick="backToMain()" style="background-color: #757575;">رجوع للبداية</button>
        <div id="recitationDisplay" style="margin-top:20px; text-align:right; direction:rtl; font-size:20px; max-height:350px; overflow-y:auto; padding:15px; background:#fffde7; border-radius:8px; border: 1px solid #fff59d;"></div>
    </div>
    
    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
    <h3>قسم التسبيح</h3>
    <h1 id="count" style="font-size: 42px; margin: 10px 0; color: #1a5235;">0</h1>
    <button onclick="increment()">اضغط للتسبيح</button>
    <button onclick="resetCounter()" style="background-color: #b71c1c;">تصفير</button>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
    <a href="mailto:qurancommunication@gmail.com" class="contact-btn">التواصل مع المبرمج</a>
</div>

<audio id="audioPlayer"></audio>

<script src="script.js"></script>
</body>
</html>
